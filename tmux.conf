# sane defaults
set -g default-terminal "screen-256color"
set -g mouse on
set -s escape-time 0

# map tmux-leader to C-a
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# --- 2. THE NAVIGATION FIXES ---
# Navigate panes with Ctrl-p and Ctrl-n (No prefix needed)
bind p previous-window
bind n next-window
bind C-p previous-window
bind C-n next-window

# --- 4. RESTORING ESSENTIAL DEFAULTS ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind & kill-window

# copy-paste
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle

bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# binds
unbind r
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced!'
bind C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# --- Shift-Enter (Mistral Vibe)
# Enable xterm-keys for extended combinations
setw -g xterm-keys on

# Ensure the terminal overrides support the specific sequence
set -as terminal-overrides ',*:Setul=\E[58::%p1%dm'

# bind-key -n "\e[13;2u" send-keys "\e[13;2u"
bind-key -n S-Enter send-keys "\e[13;2u"

# theme separator line
setw -g pane-active-border-style fg=#3daee9

# --- Status Bar ---
set -g status on
set -g status-style bg=default
set -g status-left '#S > '
set -g status-left-length 40

set -g window-status-format '#W'
set -g window-status-style 'fg=colour250,dim'
set -g window-status-current-format '#W'
set -g window-status-current-style fg=white
set -g window-status-separator '  '

set -g status-right ''

# --- Navigation ---
bind C-c new-window -a
bind \\ split-window -h
bind - split-window -v

# --- TMUX plugin manager ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# keep at the end of the file
run -b '~/.tmux/plugins/tpm/tpm'
